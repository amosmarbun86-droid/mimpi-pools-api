name: Bot Pemburu Angka Real-Time

on:
  schedule:
    # Berjalan otomatis setiap 15 menit sekali
    - cron: '*/15 * * * *'
  workflow_dispatch: # Tombol rahasia agar bisa kita klik manual kapan saja

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Ambil Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Engine
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Jalankan Bot Eksekusi Angka
      run: node bikin-pools.js

    - name: Commit & Push Perubahan ke Repositori
      run: |
        git config --global user.name "Amos Bot Auto"
        git config --global user.email "amosmarbun86-droid@users.noreply.github.com"
        git add pools.json
        git diff-index --quiet HEAD || git commit -m "Otomatis update angka pasar nyata [Skip CI]"
        git push
